services:
  - type: web
    name: gamegloom-api
    runtime: python
    region: frankfurt
    plan: free
    rootDir: src
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: IGDB_CLIENT_ID
        sync: false
      - key: IGDB_ACCESS_TOKEN
        sync: false
      - key: IGDB_CLIENT_SECRET
        sync: false
      - key: IGDB_WEBHOOK_SECRET
        sync: false
      - key: STEAM_API_KEY
        sync: false
      - key: PSN_NPSSO
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.11"
