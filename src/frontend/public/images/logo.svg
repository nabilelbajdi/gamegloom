<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 40" fill="none">
  <defs>
    <!-- Subtle gold gradient for premium feel -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <!-- Subtle glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- GameGloom as one continuous word using tspan for color change -->
  <text x="0" y="30" 
        font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" 
        font-size="32" 
        font-weight="700" 
        letter-spacing="-1"><tspan fill="#ffffff">Game</tspan><tspan fill="url(#goldGradient)" filter="url(#glow)">Gloom</tspan></text>
</svg>
